<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<title>Deadlock — рандомайзер + Hero ролл (вертикальная прокрутка)</title>
<style>
  @font-face {
    font-family: 'Forevs Demo';
    src: url('fonts/Forevs Demo/forevsdemo-bold.otf') format('opentype');
    font-weight: 700;
  }
  @font-face {
    font-family: 'Forevs Demo';
    src: url('fonts/Forevs Demo/forevsdemo-medium.otf') format('opentype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'Radiance';
    src: url('fonts/Radiance/radiance-regular.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'Radiance';
    src: url('fonts/Radiance/radiance-semibold.otf') format('opentype');
    font-weight: 600;
  }
  @font-face {
    font-family: 'Radiance';
    src: url('fonts/Radiance/radiance-bold.otf') format('opentype');
    font-weight: 700;
  }

  :root {
    --bg: #1c1508;
    --card: rgba(42, 32, 16, 0.82);
    --accent: #c8922a;
    --text: #f5ead6;
    --muted: #b09870;
    --border: #5a4828;
  }
  body { background: var(--bg); color: var(--text); margin: 24px; font-family: 'Radiance', Inter, system-ui, sans-serif; background-size: cover; background-position: center; background-attachment: fixed; }
  h1 { margin: 0 0 16px; letter-spacing: .3px; font-family: 'Forevs Demo', sans-serif; font-weight: 700; }
  h2 { margin: 18px 0 10px; letter-spacing: .2px; font-size: 16px; color: var(--text); }

  .controls {
    display: grid; grid-template-columns: repeat(5, max-content); gap: 12px 18px; align-items: end;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; box-shadow: 0 10px 30px rgba(0,0,0,.25);
  }
  .controls.hero-controls { grid-template-columns: repeat(3, max-content); }

  label { display: grid; gap: 6px; font-size: 12px; color: var(--muted); }
  
  .number-input-wrapper {
    display: flex; gap: 6px; align-items: center;
  }
  .number-input-wrapper button {
    width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; flex-shrink: 0;
  }
  .number-input-wrapper input[type="number"] {
    width: 50px; padding: 8px; border-radius: 12px; border: 1px solid var(--border);
    background: #2a1e0e; color: var(--text); outline: none;
    text-align: center; font-weight: 500;
  }
  
  input[type="number"] {
    width: 84px; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border);
    background: #2a1e0e; color: var(--text); outline: none;
  }
  
  /* Hide spinner arrows for number inputs */
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type="number"][type="number"] {
    -moz-appearance: textfield;
  }
  button {
    padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); background: linear-gradient(180deg,#4a3518,#32240e);
    color: var(--text); cursor: pointer; transition: transform .05s ease, box-shadow .2s ease;
    box-shadow: 0 6px 18px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
    font-family: 'Radiance', Inter, system-ui, sans-serif;
  }
  button:hover { box-shadow: 0 10px 28px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06); }
  button:active { transform: translateY(1px); }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, max-content)); column-gap: 28px; row-gap: 32px; margin-top: 16px; justify-content: flex-start; }

  /* Items grid: fixed 4 columns, compact size */
  #result { grid-template-columns: repeat(4, max-content); column-gap: 12px; row-gap: 14px; margin-top: 0; }
  #result .slot { width: 80px; height: 80px; }
  .item-frame { position: relative; width: 100%; height: 110px; flex-shrink: 0; }
  .item-frame img { width: 100%; height: 100%; object-fit: contain; display: block; }
  #result .item-frame { height: 80px; padding: 2px; box-sizing: border-box; }
  #result .item-frame img { width: 100%; height: 100%; object-fit: contain; }

  /* Увеличенный отступ между слотами героев */
  #heroResult { gap: 40px; margin-top: 48px; margin-left: 48px; }
  #heroResult .hero-slot { width: 120px; height: 175px; }
  #heroResult .hero-slot-inner img { height: 175px; }
  #heroResult .caption { width: 120px; font-size: 11px; }

  /* Условия: отдельные слоты с анимацией */
  #condResult { gap: 28px; margin-top: 24px; margin-left: 48px; }
  .cond-slot { width: 220px; height: 110px; overflow: hidden; border-radius: 14px; border: 1px solid var(--border); background: #2a1e0e; }
  .cond-slot .slot-inner img { width: 100%; height: 110px; object-fit: contain; display: block; }

  .item {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 10px; display: flex; flex-direction: column; align-items: center;
    box-shadow: 0 8px 24px rgba(0,0,0,.28);
    transition: transform .12s ease, box-shadow .2s ease;
  }
  .item:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(0,0,0,.35); }

  /* Вертикальный слот предметов */
  .slot { position: relative; width: 110px; height: 110px; overflow: hidden; border-radius: 10px; border: 1px solid var(--border); }

  /* Название предмета — оверлей внизу слота */
  .item-name {
    position: absolute; bottom: 0; left: 0;
    width: 100%; min-height: 26px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.72);
    z-index: 4; box-sizing: border-box; padding: 3px 4px;
  }
  .item-name p {
    width: 100%; text-align: center; font-size: 11.36px; line-height: 1.1;
    color: #020101; font-weight: 700; margin: 0; padding: 0 2px;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    text-overflow: ellipsis;
  }
  @keyframes card-deal {
    0%   { opacity: 0; transform: translateY(-18px) scale(0.82) rotateX(30deg); }
    60%  { opacity: 1; transform: translateY(3px) scale(1.03) rotateX(0deg); }
    100% { opacity: 1; transform: translateY(0) scale(1) rotateX(0deg); }
  }
  .flip-wrapper.dealing {
    animation: card-deal 0.35s cubic-bezier(.25,.8,.25,1) both;
  }

  /* Flip card */
  .flip-wrapper {
    width: 95px; height: 134px;
    perspective: 600px;
    cursor: pointer;
    border-radius: 6px;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }
  .flip-wrapper:hover .flipper:not(.flipped) { transform: rotateY(10deg); }
  .flip-wrapper:not(:has(.flipper.flipped)):hover {
    transform: translateY(-3px);
    box-shadow:
      0 0 10px 2px rgba(200, 146, 42, 0.45),
      0 0 28px 6px rgba(200, 146, 42, 0.2),
      0 8px 20px rgba(0,0,0,0.4);
  }
  .flipper {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.4,0,.2,1);
  }
  .flipper.flipped { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 6px;
    overflow: hidden;
  }
  .card-front {
    display: flex; align-items: center; justify-content: center;
  }
  .card-front::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.18) 0px,
        rgba(255,255,255,0.18) 1px,
        transparent 1px,
        transparent 8px
      ),
      repeating-linear-gradient(
        -45deg,
        rgba(255,255,255,0.18) 0px,
        rgba(255,255,255,0.18) 1px,
        transparent 1px,
        transparent 8px
      ),
      url('items/cards/card_backer_weapon_t1_psd.png');
    background-size: auto, cover;
    filter: grayscale(0.3) brightness(0.6) sepia(0.5);
    border-radius: 6px;
  }
  .card-front-logo {
    width: 52px; height: 52px;
    opacity: 0.6;
    position: relative; z-index: 1;
  }
  .card-back {
    transform: rotateY(180deg);
    display: flex; flex-direction: column;
  }
  .card-back .slot { flex-shrink: 0; border: none; border-radius: 0; }
  .card-back .item-name { position: static; flex: 1; min-height: unset; background: transparent; padding: 2px 3px; }
  .card-back .item-name p { color: #020101; font-size: 13px; }

  /* Бейдж тира */
  .tier-badge { position: absolute; top: 0; right: 0; width: 30px; height: 30px; z-index: 5; pointer-events: none; filter: drop-shadow(-2px 0px 3px rgba(0,0,0,.8)); }
  .tier-badge-bg { width: 100%; height: 100%; clip-path: polygon(100% 0, 100% 100%, 0 0); }
  .tier-badge-num { position: absolute; top: 2px; right: 2px; width: 55%; text-align: center; font-size: 10px; color: #020101; font-weight: 900; line-height: 1; }
  #result .tier-badge { width: 28px; height: 28px; }
  #result .tier-badge-num { font-size: 10px; }
  .slot-inner { display:flex; flex-direction: column; will-change: transform; }
  .slot-inner img { width: 100%; height: 110px; object-fit: cover; display: block; }

  /* Вертикальный слот героя (карта) */
  .hero-slot { width: 180px; height: 260px; overflow: hidden; border-radius: 14px; border: 1px solid var(--border); background: #2a1e0e; }
  .hero-slot-inner { display:flex; flex-direction: column; will-change: transform; }
  .hero-slot-inner img { width: 100%; height: 260px; object-fit: contain; display: block; }

  .caption{
    margin-top: 8px;
    font-size: 12px;
    line-height: 1.2;
    width: 110px;
    height: calc(1.2em * 2);
    text-align: center;
    color: var(--muted);
    overflow: hidden;
    word-break: break-word;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .warn { color:#ff8282; font-size:12px; margin-top: 8px; }
  .total-cost {
    font-size: 13px; color: var(--text); font-weight: 600;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
    display: flex; align-items: center; gap: 6px;
    min-height: 38px; box-sizing: border-box; white-space: nowrap;
  }
  .total-cost .souls-icon { height: 16px; width: auto; vertical-align: middle; margin-left: 2px; }

  /* Build section: items left, controls right */
  .build-layout {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }
  .build-sidebar {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
  }
  #buildControls {
    display: flex;
    flex-direction: column;
    gap: 8px;
    grid-template-columns: unset;
  }
  #buildControls label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>
  <h1>Deadlock build randomizer</h1>

  <div class="build-layout">
    <div class="build-sidebar">
      <div class="controls" id="buildControls">
        <label>Total items:
          <div class="number-input-wrapper">
            <button class="dec-btn" data-target="total">−</button>
            <input id="total" type="number" min="1" value="12">
            <button class="inc-btn" data-target="total">+</button>
          </div>
        </label>
        <label>Tier 1:
          <div class="number-input-wrapper">
            <button class="dec-btn" data-target="tier1">−</button>
            <input id="tier1" type="number" min="0" value="0">
            <button class="inc-btn" data-target="tier1">+</button>
          </div>
        </label>
        <label>Tier 2:
          <div class="number-input-wrapper">
            <button class="dec-btn" data-target="tier2">−</button>
            <input id="tier2" type="number" min="0" value="0">
            <button class="inc-btn" data-target="tier2">+</button>
          </div>
        </label>
        <label>Tier 3:
          <div class="number-input-wrapper">
            <button class="dec-btn" data-target="tier3">−</button>
            <input id="tier3" type="number" min="0" value="0">
            <button class="inc-btn" data-target="tier3">+</button>
          </div>
        </label>
        <label>Tier 4:
          <div class="number-input-wrapper">
            <button class="dec-btn" data-target="tier4">−</button>
            <input id="tier4" type="number" min="0" value="0">
            <button class="inc-btn" data-target="tier4">+</button>
          </div>
        </label>
        <button id="rollBtn">Create build</button>
      </div>
      <div id="warn" class="warn"></div>
      <div id="totalCost" class="total-cost"><span>Total cost:</span><strong>???<img src="items/souls/Souls.webp" class="souls-icon" style="opacity:0"></strong></div>
    </div>
    <div id="result" class="grid"></div>
  </div>

  <h2>Hero roll</h2>
  <div class="controls hero-controls" id="heroControls">
    <label>Heroes (min 3): 
      <div class="number-input-wrapper">
        <button class="dec-btn" data-target="heroCount">−</button>
        <input id="heroCount" type="number" min="3" value="3">
        <button class="inc-btn" data-target="heroCount">+</button>
      </div>
    </label>
    <button id="rollHeroBtn">Roll Hero</button>
    <button id="stopHeroBtn" disabled>Stop</button>
  </div>
    <button id="stopHeroBtn" disabled>Stop</button>
  </div>

  <div id="heroResult" class="grid"></div>
  <h2>Game conditions</h2>
  <div class="controls" id="condControls" style="grid-template-columns: repeat(3, max-content);">
    <label>Conditions: 
      <div class="number-input-wrapper">
        <button class="dec-btn" data-target="condCount">−</button>
        <input id="condCount" type="number" min="0" value="0">
        <button class="inc-btn" data-target="condCount">+</button>
      </div>
    </label>
    <button id="rollCondBtn">Roll conditions</button>
    <button id="stopCondBtn" disabled>Stop</button>
  </div>

<div id="condResult" class="grid"></div>
<div id="condWarn" class="warn"></div>

<script>
// Рандомный фон из папки backgrounds
(function () {
  const BG_FILES = [
    'Background_Buildings.png',
  ];
  const file = BG_FILES[Math.floor(Math.random() * BG_FILES.length)];
  document.body.style.backgroundImage = `url('backgrounds/${file}')`;
})();

window.addEventListener('DOMContentLoaded', () => {
  // =========================================================
  // 8) GAME CONDITIONS (отдельная кнопка + анимация, без повторов)
  // =========================================================
  const CONDITION_GROUPS = {
    early: [
      "Не фармить нейтралов 10 минут",
      "Не бить коробки 10 минут",
      "Не фармить казики 15 минут"
    ],
    combat: [
      "Не стрелять 5 минут",
      "Не использовать скиллы 10 минут",
    ],
    build: [
      "Сборка по порядку",
      "Произвольная сборка",
      "От нижнего тира к высшему",
      "От высшего тира к низшему"
    ]
  };

  // ЛИМИТ: максимум условий из каждой группы (аналог «лимита тира»)
  // Меняй цифры как захочешь.
  const CONDITION_GROUP_LIMITS = {
    early: 1,
    combat: 1,
    build: 1,
  };

  const CONDITIONS = Object.values(CONDITION_GROUPS).flat();

  const condCountEl  = document.getElementById('condCount');
  const condResultEl = document.getElementById('condResult');
  const condWarnEl   = document.getElementById('condWarn');
  const rollCondBtn  = document.getElementById('rollCondBtn');
  const stopCondBtn  = document.getElementById('stopCondBtn');

  let condSlots = [];
  let condFinal = [];
  let condSpinning = false;
  let condStopping = false;

  function pickUniqueConditions(n) {
    // Берём уникально и соблюдаем лимит на группу.
    const groups = Object.keys(CONDITION_GROUPS);

    // по одному «мешку» на группу
    const bags = {};
    for (const g of groups) bags[g] = shuffle([...CONDITION_GROUPS[g]]);

    const picked = [];
    const pickedSet = new Set();
    const perGroup = Object.fromEntries(groups.map(g => [g, 0]));

    // чтобы не зациклиться, ограничим количество попыток
    let guard = 0;
    const maxGuard = 2000;

    while (picked.length < n && guard++ < maxGuard) {
      // группы, из которых ещё можно взять (есть элементы и не достигнут лимит)
      const availableGroups = groups.filter(g => {
        const lim = (CONDITION_GROUP_LIMITS[g] ?? Infinity);
        return bags[g].length > 0 && perGroup[g] < lim;
      });
      if (!availableGroups.length) break;

      const g = availableGroups[Math.floor(Math.random() * availableGroups.length)];
      const cand = bags[g].pop();
      if (!cand) continue;
      if (pickedSet.has(cand)) continue;

      picked.push(cand);
      pickedSet.add(cand);
      perGroup[g]++;
    }

    return picked;
  }

  function makeCondImg(text) {
    // простой SVG-рендер текста в "картинку" для слота
    const safe = String(text)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');

    const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="110" viewBox="0 0 220 110">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e2010"/>
      <stop offset="1" stop-color="#201608"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="220" height="110" rx="14" ry="14" fill="url(#g)"/>
  <text x="110" y="55" text-anchor="middle" dominant-baseline="middle"
        font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
        font-size="14" fill="#e8f0ff">${safe}</text>
</svg>`;

    const img = document.createElement('img');
    img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
    img.dataset.name = text;
    return img;
  }

  rollCondBtn.addEventListener('click', async () => {
    if (condSpinning || condStopping) return;

    // СБРОС предыдущего ролла условий
    condWarnEl.textContent = '';
    condResultEl.innerHTML = '';
    stopCondBtn.disabled = true;
    condStopping = false;
    condSpinning = false;
    for (const s of condSlots) cancelAnimationFrame(s._raf);
    condSlots = [];

    const requested = Math.max(0, parseInt(condCountEl?.value, 10) || 0);
    if (requested === 0) return;

    condFinal = pickUniqueConditions(requested);
    if (condFinal.length < requested) {
      condWarnEl.textContent = `Предупреждение: условий всего ${condFinal.length}, запрос был ${requested}.`;
    }

    condSlots = [];
    condFinal.forEach(text => {
      const card = document.createElement('div');
      card.className = 'item';

      const slot = document.createElement('div');
      slot.className = 'cond-slot';

      const inner = document.createElement('div');
      inner.className = 'slot-inner';
      slot.appendChild(inner);

      const cap = document.createElement('div');
      cap.className = 'caption';
      cap.textContent = text;
      slot._caption = cap;

      card.appendChild(slot);
      card.appendChild(cap);
      condResultEl.appendChild(card);

      condSlots.push(slot);
    });

    // анимация как у предметов
    condSlots.forEach(slot => startLinearSpin(slot, CONDITIONS, makeCondImg, spinSpeed));

    condSpinning = true;
    stopCondBtn.disabled = false;

    await new Promise(requestAnimationFrame);
  });

  stopCondBtn.addEventListener('click', async () => {
    if (!condSpinning || condStopping) return;
    condStopping = true;
    stopCondBtn.disabled = true;

    const promises = condSlots.map((slot, i) => {
      const delay = Math.random() * 300;
      return new Promise(resolve => {
        setTimeout(() => {
          stopWithDecel(slot, condFinal[i], CONDITIONS, makeCondImg, stopSpeed, decelSpins).then(resolve);
        }, delay);
      });
    });

    await Promise.all(promises);

    condSpinning = false;
    condStopping = false;
  });

  // =========================================================
  // 0) КНОПКИ ДЛЯ БИЛДА (STOP + Random tier)
  // =========================================================
  const buildControls = document.getElementById('buildControls');

  let revealAllBtn = document.getElementById('revealAllBtn');
  if (!revealAllBtn) {
    revealAllBtn = document.createElement('button');
    revealAllBtn.id = 'revealAllBtn';
    revealAllBtn.textContent = 'Reveal All';
    revealAllBtn.disabled = true;
    buildControls.appendChild(revealAllBtn);
  }

  let randBtn = document.getElementById('randBtn');
  if (!randBtn) {
    randBtn = document.createElement('button');
    randBtn.id = 'randBtn';
    randBtn.textContent = 'Random tier';
    buildControls.appendChild(randBtn);
  }

  // =========================================================
  // 1) ПРЕДМЕТЫ (TIERS)
  // =========================================================
  const TIERS = {
    1: [
      "Close Quarters","Extended Magazine","Headshot Booster","High Velocity Rounds","Monster Rounds","Rapid Rounds","Restorative Shot",
      "Extra Health","Extra Regen","Extra Stamina","Healing Rite","Melee Lifesteal","Rebuttal","Sprint Boots",
      "Extra Charge","Extra Spirit","Mystic Burst","Mystic Expansion","Mystic Regeneration","Golden Goose Egg","Rusted Barrel","Spirit Strike"
    ],
    2: [
      "Active Reload","Stalker","Fleetfoot","Intensifying Magazine","Kinetic Dash","Long Range","Melee Charge","Mystic Shot",
      "Opening Rounds","Slowing Bullets","Spirit Shredder Bullets","Split Shot","Swift Striker","Titanic Magazine","Weakening Headshot",
      "Recharging Rush",
      "Battle Vest","Bullet Lifesteal","Debuff Reducer","Enchanter's Emblem","Enduring Speed","Guardian Ward","Healbane","Healing Booster",
      "Reactive Barrier","Restorative Locket","Return Fire","Spirit Lifesteal","Spirit Shielding","Weapon Shielding",
      "Arcane Surge","Bullet Resist Shredder","Cold Front","Compress Cooldown","Duration Extender","Improved Spirit","Mystic Slow",
      "Mystic Vulnerability","Quicksilver Reload","Slowing Hex","Spirit Sap","Suppressor"
    ],
    3: [

  const conflictGroups = (() => {
    const adj = new Map();
    const addEdge = (a,b) => {
      if(!adj.has(a)) adj.set(a,new Set());
      if(!adj.has(b)) adj.set(b,new Set());
      adj.get(a).add(b); adj.get(b).add(a);
    };
    for (const [result, parts] of Object.entries(RECIPES)) {
      for (const p of parts) addEdge(result, p);
    }
    for (const it of ALL_ITEMS) if(!adj.has(it)) adj.set(it, new Set());

    const visited = new Set();
    const groups = [];
    for (const node of adj.keys()) {
      if (visited.has(node)) continue;
      const stack = [node];
      const comp = new Set();
      visited.add(node);
      while (stack.length) {
        const v = stack.pop();
        comp.add(v);
        for (const w of adj.get(v)) {
          if (!visited.has(w)) { visited.add(w); stack.push(w); }
        }
      }
      groups.push(comp);
    }
    const compIndex = new Map();
    groups.forEach((set, idx)=>{ for(const name of set) compIndex.set(name, idx); });
    return { groups, compIndex };
  })();

  const sameGroup = (a, b) => {
    const ai = conflictGroups.compIndex.get(a);
    const bi = conflictGroups.compIndex.get(b);
    return ai !== undefined && ai === bi && a !== b;
  };

    const parts = m[1].split(',').map(s => parseFloat(s.trim()));
    return parts.length >= 6 ? parts[5] : 0;
  }

  function startLinearSpin(slotEl, pool, makeImgFn, speedPx = 240) {
    const inner = slotEl.querySelector('.slot-inner, .hero-slot-inner');
    const frame = slotEl.clientHeight;

    if (!inner.children.length) {
      inner.appendChild(makeImgFn(pool[Math.floor(Math.random() * pool.length)]));
      for (let i = 0; i < 6; i++) inner.appendChild(makeImgFn(pool[Math.floor(Math.random()*pool.length)]));
    }

    slotEl._offset = slotEl._offset || 0;
    slotEl._lastTs = 0;

    function step(ts) {
      if (!slotEl._lastTs) slotEl._lastTs = ts;
      const dt = (ts - slotEl._lastTs) / 1000;
      slotEl._lastTs = ts;

      slotEl._offset += speedPx * dt;

      while (slotEl._offset >= frame) {
        slotEl._offset -= frame;
        inner.insertBefore(makeImgFn(pool[Math.floor(Math.random()*pool.length)]), inner.firstChild);
        if (inner.children.length > 16) inner.removeChild(inner.lastChild);
      }

      const y = -frame + slotEl._offset;
      inner.style.transition = 'none';
      inner.style.transform  = `translateY(${y}px)`;

      const progress = (y + frame) / frame;
      const idx = progress < 0.5 ? 1 : 0;
      const vis = inner.children[idx];
      if (vis && slotEl._caption) slotEl._caption.textContent = vis.dataset.name || '';

      slotEl._raf = requestAnimationFrame(step);
    }

    cancelAnimationFrame(slotEl._raf);
    slotEl._raf = requestAnimationFrame(step);
  }

  function stopWithDecel(slotEl, finalEntry, pool, makeImgFn, speedPx = 240, extraSpins = 6) {
    const inner = slotEl.querySelector('.slot-inner, .hero-slot-inner');
    cancelAnimationFrame(slotEl._raf);

    const frame = slotEl.clientHeight;
    const k = extraSpins + 1;

    const y0 = getTranslateY(inner);
    inner.style.transition = 'none';
    inner.style.transform  = `translateY(${y0}px)`;
    inner.offsetHeight;

    for (let i = 0; i < extraSpins; i++) inner.insertBefore(makeImgFn(pool[Math.floor(Math.random()*pool.length)]), inner.firstChild);
    inner.insertBefore(makeImgFn(finalEntry), inner.firstChild);

    const yStart = y0 - k * frame;
    inner.style.transform = `translateY(${yStart}px)`;
    inner.offsetHeight;

    const distance = 0 - yStart;
    const duration = Math.max(180, Math.round((Math.abs(distance) / speedPx) * 1000));

    let stopRaf;
    function tickCaption() {
      const yy = getTranslateY(inner);
      const idx = Math.min(inner.children.length - 1, Math.max(0, Math.round(-yy / frame)));
      const vis = inner.children[idx];
      if (vis && slotEl._caption) slotEl._caption.textContent = vis.dataset.name || '';
      stopRaf = requestAnimationFrame(tickCaption);
    }

    requestAnimationFrame(() => {
      inner.style.transition = `transform ${duration}ms cubic-bezier(.2,.9,.1,1)`;
      inner.style.transform  = 'translateY(0)';
      stopRaf = requestAnimationFrame(tickCaption);
    });

    const finalName = (finalEntry && typeof finalEntry === 'object') ? (finalEntry.name || '') : String(finalEntry);

    return new Promise(resolve => {
      inner.addEventListener('transitionend', () => {
        cancelAnimationFrame(stopRaf);
        if (slotEl._caption) slotEl._caption.textContent = finalName;
        inner.style.transition = 'none';
        inner.style.transform  = 'translateY(0)';
        while (inner.children.length > 14) inner.removeChild(inner.lastChild);
        resolve();
      }, { once: true });
    });
  }

  // =========================================================
  // 5) СОБИРАТЕЛЬ ПРЕДМЕТОВ (с лимитом активных)
  // =========================================================
  function buildPicks(totalWanted, counts) {
    const picks = [];
    let activeCount = 0;

    const canAdd = (name) => {
      if (!isAllowed(name, picks)) return false;
      if (ACTIVE_ITEMS.has(name) && activeCount >= ACTIVE_CAP) return false;
      return true;
    };
    const add = (name) => {
      picks.push(name);
      if (ACTIVE_ITEMS.has(name)) activeCount++;
    };

    for (let t = 1; t <= 4; t++) {
      const need = counts[t] || 0;
      if (need <= 0) continue;

      const pool = shuffle([...TIERS[t]]);
      for (const cand of pool) {
        const haveInTier = picks.filter(x => TIERS[t].includes(x)).length;
        if (haveInTier >= need) break;
        if (canAdd(cand)) add(cand);
      }

      let haveInTier = picks.filter(x => TIERS[t].includes(x)).length;
      if (haveInTier < need) {
        const nonActive = shuffle(TIERS[t].filter(n => !ACTIVE_ITEMS.has(n)));
        for (const cand of nonActive) {
          haveInTier = picks.filter(x => TIERS[t].includes(x)).length;
          if (haveInTier >= need) break;
          if (canAdd(cand)) add(cand);
        }
      }
    }

    if (picks.length < totalWanted) {
      const zeroPool = [];
      for (let t = 1; t <= 4; t++) if ((counts[t] || 0) === 0) zeroPool.push(...TIERS[t]);
      shuffle(zeroPool);

      for (const cand of zeroPool) {
        if (picks.length >= totalWanted) break;
        if (canAdd(cand)) add(cand);
      }
    }

    if (picks.length < totalWanted) {
      const nonActiveAll = shuffle(ALL_ITEMS.filter(n => !ACTIVE_ITEMS.has(n)));
      for (const cand of nonActiveAll) {
        if (picks.length >= totalWanted) break;
        if (canAdd(cand)) add(cand);
      }
    }

    return picks;
  }

    currentPicks = buildPicks(totalWanted, counts);
    flippedCount = 0;

    if (currentPicks.length < totalWanted) {
      warnEl.textContent = `Предупреждение: из-за конфликтов/лимитов удалось выбрать только ${currentPicks.length} из ${totalWanted}.`;
    }

    const allCards = currentPicks.map(name => makeFlipCard(name, false));
    allCards.forEach((card, i) => {
      card.style.animationDelay = `${i * 60}ms`;
      card.classList.add('dealing');
      resultEl.appendChild(card);
    });

    revealAllBtn.disabled = false;
  });

  revealAllBtn.addEventListener('click', () => {
    resultEl.querySelectorAll('.flip-wrapper').forEach(w => flipCard(w));
  });

  randBtn.addEventListener('click', () => {
    const totalWanted = parseInt(document.getElementById('total').value) || 0;
    const [c1,c2,c3,c4] = splitTotalInto4(totalWanted);

    document.getElementById('tier1').value = c1;
    document.getElementById('tier2').value = c2;
    document.getElementById('tier3').value = c3;
    document.getElementById('tier4').value = c4;
  });

  

  // =========================================================
  // 7) HERO ROLL (3 слота, отдельные кнопки)
  // =========================================================
  const HERO_DIR = 'heroes/';

  const HEROES = [
    { name: 'Abrams',        file: 'Abrams_card.png' },
    { name: 'Bebop',         file: 'Bebop_card.png' },
    { name: 'Billy',         file: 'Billy_card.png' },
    { name: 'Calico',        file: 'Calico_card.png' },
    { name: 'Drifter',       file: 'Drifter_card.png' },
    { name: 'Dynamo',        file: 'Dynamo_card.png' },
    { name: 'Grey Talon',    file: 'Grey_Talon_card.png' },
    { name: 'Haze',          file: 'Haze_card.png' },
    { name: 'Holliday',      file: 'Holliday_card.png' },
    { name: 'Infernus',      file: 'Infernus_card.png' },
    { name: 'Ivy',           file: 'Ivy_card.png' },
    { name: 'Kelvin',        file: 'Kelvin_card.png' },
    { name: 'Lady Geist',    file: 'Lady_Geist_card.png' },
    { name: 'Lash',          file: 'Lash_card.png' },
    { name: 'McGinnis',      file: 'McGinnis_card.png' },
    { name: 'Mina',          file: 'Mina_card.png' },
    { name: 'Mirage',        file: 'Mirage_card.png' },
    { name: 'Mo & Krill',    file: 'Mo_&_Krill_card.png' },
    { name: 'Paige',         file: 'Paige_card.png' },
    { name: 'Paradox',       file: 'Paradox_card.png' },
    { name: 'Pocket',        file: 'Pocket_card.png' },
    { name: 'Seven',         file: 'Seven_card.png' },
    { name: 'Shiv',          file: 'Shiv_card.png' },
    { name: 'Sinclair',      file: 'Sinclair_card.png' },
    { name: 'Doorman',       file: 'The_Doorman_card.png' },
    { name: 'Victor',        file: 'Victor_card.png' },
    { name: 'Vindicta',      file: 'Vindicta_card.png' },
    { name: 'Viscous',       file: 'Viscous_card.png' },
    { name: 'Vyper',         file: 'Vyper_card.png' },
    { name: 'Warden',        file: 'Warden_card.png' },
    { name: 'Wraith',        file: 'Wraith_card.png' },
    { name: 'Yamato',        file: 'Yamato_card.png' },

    { name: 'Graves',        file: 'Graves_card.png' },
    { name: 'Celeste',       file: 'Celeste_card.png' },
    { name: 'Apollo',        file: 'Apollo_card.png' },
    { name: 'Venator',       file: 'Venator_card.png' },
    { name: 'Rem',           file: 'Rem_card.png' },
    { name: 'Silver',        file: 'Silver_card.png' },
  ];

  const makeHeroImg = (hero) => {
    const img = document.createElement('img');
    img.src = hero.imageUrl || (HERO_DIR + hero.file);
    img.dataset.name = hero.name;
    return img;
  };

  const heroResultEl = document.getElementById('heroResult');
  const rollHeroBtn  = document.getElementById('rollHeroBtn');
  const stopHeroBtn  = document.getElementById('stopHeroBtn');
  const heroCountEl  = document.getElementById('heroCount');

  let heroSlots = [];
  let heroFinal = [];
  let heroSpinning = false;
  let heroStopping = false;

  function pickRandomHeroes(n) {
    const pool = shuffle([...HEROES]);
    return pool.slice(0, Math.min(n, pool.length));
  }

  rollHeroBtn.addEventListener('click', async () => {
    if (heroSpinning || heroStopping) return;
    if (!HEROES.length) return;

    // СБРОС предыдущего ролла героев
    heroResultEl.innerHTML = '';
    stopHeroBtn.disabled = true;
    heroStopping = false;
    heroSpinning = false;
    for (const s of heroSlots) cancelAnimationFrame(s._raf);
    heroSlots = [];

    const n = Math.max(3, parseInt(heroCountEl?.value, 10) || 3);
    heroFinal = pickRandomHeroes(n);
    heroSlots = [];

    heroFinal.forEach(h => {
      const card = document.createElement('div');
      card.className = 'item';

      const slot = document.createElement('div');
      slot.className = 'hero-slot';

      const inner = document.createElement('div');
      inner.className = 'hero-slot-inner';
      slot.appendChild(inner);

      const cap = document.createElement('div');
      cap.className = 'caption';
      cap.textContent = (h.name || '').replace(/_/g,' ');
      slot._caption = cap;

      card.appendChild(slot);
      card.appendChild(cap);
      heroResultEl.appendChild(card);

      heroSlots.push(slot);
    });

    heroSlots.forEach(slot => startLinearSpin(slot, HEROES, makeHeroImg, spinSpeed * 1.7));

    heroSpinning = true;
    stopHeroBtn.disabled = false;

    await new Promise(requestAnimationFrame);
  });

  stopHeroBtn.addEventListener('click', async () => {
    if (!heroSpinning || heroStopping) return;
    heroStopping = true;
    stopHeroBtn.disabled = true;

    const promises = heroSlots.map((slot, i) => {
      const delay = Math.random() * 300;
      return new Promise(resolve => {
        setTimeout(() => {
          stopWithDecel(slot, heroFinal[i], HEROES, makeHeroImg, stopSpeed * 3, decelSpins).then(resolve);
        }, delay);
      });
    });

    await Promise.all(promises);

    heroSpinning = false;
    heroStopping = false;
  });

  // =========================================================
  // API INTEGRATION
  // =========================================================
  async function initFromAPI() {
    const statusEl = document.createElement('div');
    statusEl.style.cssText = 'font-size:12px;color:var(--muted);margin:0 0 10px;';
    statusEl.textContent = 'Загрузка данных из API...';
    document.querySelector('h1').after(statusEl);

    rollBtn.disabled = true;
    rollHeroBtn.disabled = true;

    try {
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), 8000);

      const [heroesRes, itemsRes, genericRes, iconsRes] = await Promise.all([
        fetch('https://assets.deadlock-api.com/v2/heroes?language=english&only_active=true', { signal: controller.signal }),
        fetch('https://assets.deadlock-api.com/v2/items?language=english', { signal: controller.signal }),
        fetch('https://assets.deadlock-api.com/v2/generic-data', { signal: controller.signal }),
        fetch('https://assets.deadlock-api.com/v1/icons', { signal: controller.signal })
      ]);
      clearTimeout(tid);

      if (heroesRes.ok) {
        const heroes = await heroesRes.json();
        for (const h of heroes) {
          const name = h.name;
          if (!name || name.includes('_')) continue; // skip internal class names
          const imgUrl = h.images?.icon_hero_card || h.images?.icon_image_small;
          const existing = HEROES.find(x => x.name === name);
          if (existing) {
            if (imgUrl) existing.imageUrl = imgUrl;
          } else if (imgUrl) {
            HEROES.push({ name, imageUrl: imgUrl });
          }
        }
      }

      if (itemsRes.ok) {
        const items = await itemsRes.json();
        for (const item of items) {
          const type = item.type;
          if (!['weapon', 'spirit', 'vitality'].includes(type)) continue;
          const name = item.name;
          if (!name || name.includes('_')) continue; // skip internal class names
          const tier = item.item_tier ?? item.tier ?? item.shop_tier;
          const imgUrl = item.image_webp || item.image;
          if (imgUrl) API_ITEM_IMAGE.set(name, imgUrl);
          if (tier >= 1 && tier <= 4 && !ALL_ITEMS.includes(name)) {
            TIERS[tier].push(name);
            ALL_ITEMS.push(name);
            ITEM_TIER.set(name, tier);
            ITEM_TYPE.set(name, type);
          }
        }
      }

      if (genericRes.ok) {
        const generic = await genericRes.json();
        const prices = generic.item_price_per_tier;
        if (Array.isArray(prices)) {
          for (let tier = 1; tier <= 4; tier++) {
            if (prices[tier] != null) TIER_COST[tier] = prices[tier];
          }
        }
      }

      if (iconsRes.ok) {
        const icons = await iconsRes.json();
        if (icons.icon_soul) SOULS_ICON_URL = icons.icon_soul;
      }

      statusEl.remove();
    } catch (e) {
      console.warn('Deadlock API load failed:', e);
      statusEl.textContent = 'API недоступен, используются локальные данные.';
      setTimeout(() => statusEl.remove(), 3000);
    } finally {
      rollBtn.disabled = false;
      rollHeroBtn.disabled = false;
    }
  }

  // =========================================================
  // ЧИСЛО ИНПУТ КОНТРОЛЛЕРЫ (+/- КНОПКИ)
  // =========================================================
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.inc-btn, .dec-btn');
    if (!btn) return;

    const target = btn.dataset.target;
    const input = document.getElementById(target);
    if (!input) return;

    let value = parseInt(input.value, 10) || 0;
    const min = parseInt(input.min, 10) || 0;
    const max = parseInt(input.max, 10);

    if (btn.classList.contains('inc-btn')) {
      value++;
      if (max !== undefined && value > max) value = max;
    } else if (btn.classList.contains('dec-btn')) {
      value--;
      if (value < min) value = min;
    }

    input.value = value;
    input.dispatchEvent(new Event('input', { bubbles: true }));
  });

  initFromAPI();
});

</script>
