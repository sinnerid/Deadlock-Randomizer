<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<title>Deadlock© randomizer</title>
<style>
  @font-face {
    font-family: 'Forevs Demo';
    src: url('fonts/Forevs Demo/forevsdemo-bold.otf') format('opentype');
    font-weight: 700;
  }
  @font-face {
    font-family: 'Forevs Demo';
    src: url('fonts/Forevs Demo/forevsdemo-medium.otf') format('opentype');
    font-weight: 500;
  }
  @font-face {
    font-family: 'Radiance';
    src: url('fonts/Radiance/radiance-regular.otf') format('opentype');
    font-weight: 400;
  }
  @font-face {
    font-family: 'Radiance';
    src: url('fonts/Radiance/radiance-semibold.otf') format('opentype');
    font-weight: 600;
  }
  @font-face {
    font-family: 'Radiance';
    src: url('fonts/Radiance/radiance-bold.otf') format('opentype');
    font-weight: 700;
  }

  :root {
    --bg: #1c1508;
    --card: rgba(42, 32, 16, 0.82);
    --accent: #c8922a;
    --text: #f5ead6;
    --muted: #b09870;
    --border: #5a4828;
  }
  @keyframes page-fadein { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bounce-y { 0%,100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
  html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Radiance', Inter, system-ui, sans-serif; background-size: cover; background-position: center; background-attachment: fixed; animation: page-fadein 0.5s ease both; }

  /* Fixed header */
  .site-header { position: fixed; top: 0; left: 0; right: 0; z-index: 300; text-align: center; padding: 14px 48px 12px; background: rgba(10,7,2,0.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
  .site-header h1 { margin: 0; letter-spacing: 4px; font-family: 'Forevs Demo', sans-serif; font-weight: 700; text-transform: uppercase; font-size: 1.9rem; }

  /* Scroll pages — horizontal */
  .scroll-container { display: flex; flex-direction: row; width: 100vw; height: calc(100vh - 68px); overflow-x: scroll; overflow-y: hidden; scroll-snap-type: x mandatory; scroll-behavior: smooth; margin-top: 68px; }
  .page { flex: 0 0 100vw; width: 100vw; height: 100%; scroll-snap-align: start; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px 48px 90px; box-sizing: border-box; overflow-y: auto; }
  .page-summary { justify-content: flex-start; padding-top: 36px; }
  .page-subtitle { text-align: center; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin: 0 0 18px; font-family: 'Radiance', sans-serif; }

  /* Fixed side nav buttons */
  /* Bottom nav bar */
  .bottom-nav { position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%); z-index: 500; display: flex; align-items: center; gap: 16px; background: rgba(18,13,4,0.88); border: 1px solid var(--border); border-radius: 40px; padding: 10px 20px; backdrop-filter: blur(10px); }
  .back-btn, .next-btn { background: transparent; border: none; font-family: 'Radiance', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: color 0.2s, opacity 0.2s; padding: 4px 8px; border-radius: 4px; }
  .back-btn { color: var(--muted); }
  .back-btn:hover { color: var(--text); }
  .next-btn { color: var(--accent); }
  .next-btn:hover { color: #f5c96a; }
  .nav-btn-hidden { opacity: 0; pointer-events: none; }
  .page-dots { display: flex; flex-direction: row; gap: 8px; align-items: center; }
  .page-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 1px solid var(--border); cursor: pointer; transition: background 0.3s, transform 0.3s; padding: 0; }
  .page-dot.active { background: var(--accent); transform: scale(1.3); border-color: var(--accent); }

  /* Hero selection grid */
  #heroSelectGrid { display: grid; grid-template-columns: repeat(auto-fill, 95px); gap: 10px; overflow-y: auto; max-height: calc(100vh - 220px); padding: 6px 2px 2px; }
  .hero-select-card { position: relative; border-radius: 6px; overflow: hidden; cursor: pointer; transition: box-shadow 0.2s, transform 0.2s; }
  .hero-select-card:hover { transform: translateY(-2px); box-shadow: 0 0 10px 2px rgba(200,146,42,0.3); }
  .hero-select-card.selected { box-shadow: 0 0 0 2px var(--accent), 0 0 20px 4px rgba(200,146,42,0.4); transform: translateY(-2px); }
  .hero-select-card img { width: 95px; height: 134px; object-fit: cover; object-position: top center; display: block; }
  .hero-select-card .hero-name { position: absolute; bottom: 0; left: 0; right: 0; font-family: 'Radiance', sans-serif; font-weight: 700; font-size: 9px; letter-spacing: .4px; text-transform: uppercase; text-align: center; color: #fff; background: linear-gradient(transparent, rgba(0,0,0,0.8) 50%); padding: 10px 2px 4px; }
  .hero-select-card.selected .hero-name { color: var(--accent); }

  /* Summary */
  .summary-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); font-family: 'Radiance', sans-serif; font-weight: 700; margin: 0 0 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); width: 100%; text-align: left; }
  .summary-panel { display: grid; grid-template-columns: 240px 1fr; grid-template-rows: auto auto; column-gap: 40px; row-gap: 28px; align-items: start; width: 100%; max-width: 1300px; box-sizing: border-box; }
  .summary-hero-section { grid-column: 1; grid-row: 1; display: flex; flex-direction: column; }
  .summary-skills-section { grid-column: 2; grid-row: 1; display: flex; flex-direction: column; }
  .summary-items-section { grid-column: 2; grid-row: 2; display: flex; flex-direction: column; }
  #summaryTotalCost { grid-column: 1; grid-row: 2; }
  #summaryHeroes { grid-template-columns: 240px; }
  #summaryHeroes .hero-select-card img { width: 240px; height: 338px; }
  #summarySkills { grid-template-columns: repeat(6, max-content); column-gap: 8px; row-gap: 8px; }
  #summaryItems  { grid-template-columns: repeat(6, max-content); column-gap: 10px; row-gap: 12px; }

  #summaryTotalCost { font-size: 11px; letter-spacing: 2px; font-family: 'Radiance', sans-serif; font-weight: 700; color: var(--accent); padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 14px; display: flex; align-items: center; gap: 4px; }
  #summaryTotalCost .souls-icon { height: 1em; width: auto; vertical-align: middle; }
  h2 { margin: 18px 0 10px; letter-spacing: .2px; font-size: 16px; color: var(--text); }

  .controls {
    display: grid; grid-template-columns: repeat(5, max-content); gap: 12px 18px; align-items: end;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; box-shadow: 0 10px 30px rgba(0,0,0,.25);
  }
  .controls.hero-controls { grid-template-columns: repeat(3, max-content); }

  label { display: grid; gap: 6px; font-size: 12px; color: var(--muted); }
  
  .number-input-wrapper {
    display: flex; gap: 6px; align-items: center;
  }
  .number-input-wrapper button {
    width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; flex-shrink: 0;
  }
  .number-input-wrapper input[type="number"] {
    width: 50px; padding: 8px; border-radius: 12px; border: 1px solid var(--border);
    background: #2a1e0e; color: var(--text); outline: none;
    text-align: center; font-weight: 500;
  }
  
  input[type="number"] {
    width: 84px; padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border);
    background: #2a1e0e; color: var(--text); outline: none;
  }
  
  /* Hide spinner arrows for number inputs */
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type="number"][type="number"] {
    -moz-appearance: textfield;
  }
  button {
    padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border); background: linear-gradient(180deg,#4a3518,#32240e);
    color: var(--text); cursor: pointer; transition: transform .05s ease, box-shadow .2s ease;
    box-shadow: 0 6px 18px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
    font-family: 'Radiance', Inter, system-ui, sans-serif;
  }
  button:hover { box-shadow: 0 10px 28px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06); }
  button:active { transform: translateY(1px); }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, max-content)); column-gap: 28px; row-gap: 32px; margin-top: 16px; justify-content: flex-start; }

  /* Items grid: fixed 4 columns, compact size */
  #result { grid-template-columns: repeat(4, max-content); column-gap: 12px; row-gap: 14px; margin-top: 0; }
  #result .slot { width: 80px; height: 80px; }
  .item-frame { position: relative; width: 100%; height: 110px; flex-shrink: 0; }
  .item-frame img { width: 100%; height: 100%; object-fit: contain; display: block; }
  #result .item-frame { height: 80px; padding: 2px; box-sizing: border-box; }
  #result .item-frame img { width: 100%; height: 100%; object-fit: contain; }

  /* Увеличенный отступ между слотами героев */
  #heroResult { column-gap: 14px; row-gap: 14px; margin-top: 0; grid-template-columns: repeat(3, 110px); min-height: 10px; }
  .hero-flip { width: 110px; height: 155px; }
  .hero-card-back {
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    padding: 0 0 8px; border-radius: 6px; overflow: hidden;
    position: relative;
  }
  .hero-card-back img.hero-art {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: top center;
  }
  .hero-card-back .hero-name {
    position: relative; z-index: 1;
    font-family: 'Radiance', sans-serif; font-weight: 700;
    font-size: 10px; letter-spacing: .5px; text-transform: uppercase;
    text-align: center; color: #fff;
    background: linear-gradient(transparent, rgba(0,0,0,0.75) 40%);
    width: 100%; padding: 14px 4px 0; box-sizing: border-box;
  }

  /* Условия: отдельные слоты с анимацией */
  #condResult { gap: 28px; margin-top: 24px; margin-left: 48px; }
  .cond-slot { width: 220px; height: 110px; overflow: hidden; border-radius: 14px; border: 1px solid var(--border); background: #2a1e0e; }
  .cond-slot .slot-inner img { width: 100%; height: 110px; object-fit: contain; display: block; }

  .item {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 10px; display: flex; flex-direction: column; align-items: center;
    box-shadow: 0 8px 24px rgba(0,0,0,.28);
    transition: transform .12s ease, box-shadow .2s ease;
  }
  .item:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(0,0,0,.35); }

  /* Вертикальный слот предметов */
  .slot { position: relative; width: 110px; height: 110px; overflow: hidden; border-radius: 10px; border: 1px solid var(--border); }

  /* Название предмета — оверлей внизу слота */
  .item-name {
    position: absolute; bottom: 0; left: 0;
    width: 100%; min-height: 26px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.72);
    z-index: 4; box-sizing: border-box; padding: 3px 4px;
  }
  .item-name p {
    width: 100%; text-align: center; font-size: 11.36px; line-height: 1.1;
    color: #020101; font-weight: 700; margin: 0; padding: 0 2px;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    text-overflow: ellipsis;
  }
  @keyframes card-deal {
    0%   { opacity: 0; transform: translateY(-18px) scale(0.82) rotateX(30deg); }
    60%  { opacity: 1; transform: translateY(3px) scale(1.03) rotateX(0deg); }
    100% { opacity: 1; transform: translateY(0) scale(1) rotateX(0deg); }
  }
  .flip-wrapper.dealing {
    animation: card-deal 0.35s cubic-bezier(.25,.8,.25,1) both;
  }

  /* Flip card */
  .flip-wrapper {
    width: 95px; height: 134px;
    perspective: 600px;
    cursor: pointer;
    border-radius: 6px;
    transition: box-shadow 0.2s ease, transform 0.2s ease;
  }
  .flip-wrapper:hover .flipper:not(.flipped) { transform: rotateY(10deg); }
  .flip-wrapper:not(:has(.flipper.flipped)):hover {
    transform: translateY(-3px);
    box-shadow:
      0 0 10px 2px rgba(200, 146, 42, 0.45),
      0 0 28px 6px rgba(200, 146, 42, 0.2),
      0 8px 20px rgba(0,0,0,0.4);
  }
  .flipper {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.4,0,.2,1);
  }
  .flipper.flipped { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 6px;
    overflow: hidden;
  }
  .card-front {
    display: flex; align-items: center; justify-content: center;
  }
  .card-front::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.18) 0px,
        rgba(255,255,255,0.18) 1px,
        transparent 1px,
        transparent 8px
      ),
      repeating-linear-gradient(
        -45deg,
        rgba(255,255,255,0.18) 0px,
        rgba(255,255,255,0.18) 1px,
        transparent 1px,
        transparent 8px
      ),
      url('items/cards/card_backer_weapon_t1_psd.png');
    background-size: auto, cover;
    filter: grayscale(0.3) brightness(0.6) sepia(0.5);
    border-radius: 6px;
  }
  .card-front-logo {
    width: 52px; height: 52px;
    opacity: 0.6;
    position: relative; z-index: 1;
  }
  .card-back {
    transform: rotateY(180deg);
    display: flex; flex-direction: column;
  }
  .card-back .slot { flex-shrink: 0; border: none; border-radius: 0; }
  .card-back .item-name { position: static; flex: 1; min-height: unset; background: transparent; padding: 2px 3px; }
  .card-back .item-name p { color: #020101; font-size: 13px; }

  /* Бейдж тира */
  .tier-badge { position: absolute; top: 0; right: 0; width: 30px; height: 30px; z-index: 5; pointer-events: none; filter: drop-shadow(-2px 0px 3px rgba(0,0,0,.8)); }
  .tier-badge-bg { width: 100%; height: 100%; clip-path: polygon(100% 0, 100% 100%, 0 0); }
  .tier-badge-num { position: absolute; top: 2px; right: 2px; width: 55%; text-align: center; font-size: 10px; color: #020101; font-weight: 900; line-height: 1; }
  #result .tier-badge { width: 28px; height: 28px; }
  #result .tier-badge-num { font-size: 10px; }
  .slot-inner { display:flex; flex-direction: column; will-change: transform; }
  .slot-inner img { width: 100%; height: 110px; object-fit: cover; display: block; }

  /* Вертикальный слот героя (карта) */
  .hero-slot { width: 180px; height: 260px; overflow: hidden; border-radius: 14px; border: 1px solid var(--border); background: #2a1e0e; }
  .hero-slot-inner { display:flex; flex-direction: column; will-change: transform; }
  .hero-slot-inner img { width: 100%; height: 260px; object-fit: contain; display: block; }

  .caption{
    margin-top: 8px;
    font-size: 12px;
    line-height: 1.2;
    width: 110px;
    height: calc(1.2em * 2);
    text-align: center;
    color: var(--muted);
    overflow: hidden;
    word-break: break-word;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .warn { color:#ff8282; font-size:12px; margin-top: 8px; }
  .total-cost {
    font-size: 13px; color: var(--text); font-weight: 600;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
    display: flex; align-items: center; gap: 6px;
    min-height: 38px; box-sizing: border-box; white-space: nowrap;
  }
  .total-cost .souls-icon { height: 16px; width: auto; vertical-align: middle; margin-left: 2px; }

  /* Panel content box */
  .panel {
    background: rgba(18, 13, 4, 0.75);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 28px;
    flex-shrink: 0;
  }
  .panel-title {
    margin: 0 0 16px;
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Radiance', sans-serif;
    font-weight: 700;
  }
  /* Items panel internals */
  .build-sidebar {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
  }
  #buildControls {
    display: flex;
    flex-direction: column;
    gap: 8px;
    grid-template-columns: unset;
  }
  /* Skills panel header */
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  #heroSelect {
    background: rgba(42,32,16,0.9);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Radiance', sans-serif;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 5px;
    cursor: pointer;
  }
  #heroSelect:focus { outline: none; border-color: var(--accent); }
  .skill-controls {
    display: inline-flex; gap: 8px; margin-bottom: 12px;
  }
  #skillResult {
    grid-template-columns: repeat(6, max-content);
    column-gap: 8px; row-gap: 8px; margin-top: 0;
    width: max-content; margin-left: auto; margin-right: auto;
  }
  .skill-flip {
    width: 95px; height: 134px;
  }
  .skill-card-back {
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 5px 4px 6px;
    border-radius: 6px; overflow: hidden;
  }
  .skill-card-back .sc-name {
    font-size: 9px; font-family: 'Radiance', sans-serif; font-weight: 700;
    letter-spacing: .3px; text-transform: uppercase; text-align: center;
    line-height: 1.15; word-break: break-word; white-space: normal;
    max-width: 100%; flex-shrink: 0;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-clamp: 2; overflow: hidden;
  }
  .skill-card-back img {
    flex: 1 1 0; min-height: 0; max-height: 100%;
    object-fit: contain;
  }
  .skill-card-back .sc-dots {
    display: flex; gap: 3px; flex-shrink: 0;
  }
  .sc-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }

  #buildControls label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>
<body>

<!-- Fixed title — always visible -->
<header class="site-header">
  <h1>Deadlock<sup style="font-size:0.45em;vertical-align:super;">©</sup> build randomizer</h1>
  <button id="openOverlayBtn" onclick="window.open('overlay.html','deadlock_overlay','width=440,height=400')" style="position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:10px;letter-spacing:1.5px;padding:5px 12px;opacity:0.6;">OBS OVERLAY</button>
</header>

<div class="scroll-container" id="scrollContainer">

  <!-- PAGE 1: Hero selection -->
  <section class="page" id="page-heroes">
    <p class="page-subtitle">Step 1 — select your hero</p>
    <div class="panel" style="width:100%;max-width:1100px;box-sizing:border-box;padding-top:20px;">
      <div class="panel-header">
        <div class="panel-title" style="margin:0;">Hero</div>
      </div>
      <div id="heroSelectGrid"></div>
    </div>
  </section>

  <!-- PAGE 2: Ability upgrade -->
  <section class="page" id="page-skills">
    <p class="page-subtitle">Step 2 — ability upgrade order</p>
    <div class="panel" style="width:100%;max-width:1100px;box-sizing:border-box;">
      <div class="panel-header">
        <div class="panel-title" style="margin:0;">Ability upgrade</div>
        <button id="rollSkillBtn" style="flex-shrink:0;">Roll skills</button>
      </div>
      <div id="skillResult" class="grid"></div>
    </div>
    <!-- hidden select kept for JS compatibility -->
    <select id="heroSelect" style="display:none"><option value="">— Hero —</option></select>
  </section>

  <!-- PAGE 3: Items build -->
  <section class="page" id="page-items">
    <p class="page-subtitle">Step 3 — build your items</p>
    <div class="panel" style="width:100%;max-width:1100px;box-sizing:border-box;display:flex;flex-direction:column;gap:16px;">
      <div class="panel-header">
        <div class="panel-title" style="margin:0;">Build</div>
      </div>
      <div style="display:flex;gap:24px;align-items:flex-start;">
        <div class="build-sidebar">
          <div class="controls" id="buildControls">
            <label>Total items:
              <div class="number-input-wrapper">
                <button class="dec-btn" data-target="total">−</button>
                <input id="total" type="number" min="1" value="12">
                <button class="inc-btn" data-target="total">+</button>
              </div>
            </label>
            <label>Tier 1:
              <div class="number-input-wrapper">
                <button class="dec-btn" data-target="tier1">−</button>
                <input id="tier1" type="number" min="0" value="0">
                <button class="inc-btn" data-target="tier1">+</button>
              </div>
            </label>
            <label>Tier 2:
              <div class="number-input-wrapper">
                <button class="dec-btn" data-target="tier2">−</button>
                <input id="tier2" type="number" min="0" value="0">
                <button class="inc-btn" data-target="tier2">+</button>
              </div>
            </label>
            <label>Tier 3:
              <div class="number-input-wrapper">
                <button class="dec-btn" data-target="tier3">−</button>

    'Split Shot':'weapon','Swift Striker':'weapon','Titanic Magazine':'weapon',
    'Weakening Headshot':'weapon','Recharging Rush':'weapon',
    // T2 Vitality
    'Battle Vest':'vitality','Bullet Lifesteal':'vitality','Debuff Reducer':'vitality',
    "Enchanter's Emblem":'vitality','Enduring Speed':'vitality','Guardian Ward':'vitality',
    'Healbane':'vitality','Healing Booster':'vitality','Reactive Barrier':'vitality',
    'Restorative Locket':'vitality','Return Fire':'vitality','Spirit Lifesteal':'vitality',
    'Spirit Shielding':'vitality','Weapon Shielding':'vitality',
    // T2 Spirit
    'Arcane Surge':'spirit','Bullet Resist Shredder':'spirit','Cold Front':'spirit',
    'Compress Cooldown':'spirit','Duration Extender':'spirit','Improved Spirit':'spirit',
    'Mystic Slow':'spirit','Mystic Vulnerability':'spirit','Quicksilver Reload':'spirit',
    'Slowing Hex':'spirit','Spirit Sap':'spirit','Suppressor':'spirit',
    // T3 Weapon
    'Alchemical Fire':'weapon','Berserker':'weapon','Blood Tribute':'weapon','Burst Fire':'weapon',
    'Cultist Sacrifice':'weapon','Escalating Resilience':'weapon','Express Shot':'weapon',
    'Headhunter':'weapon','Heroic Aura':'weapon','Hollow Point':'weapon',
    "Hunter's Aura":'weapon','Point Blank':'weapon','Sharpshooter':'weapon',
    'Spirit Rend':'weapon','Tesla Bullets':'weapon','Toxic Bullets':'weapon','Weighted Shots':'weapon',
    // T3 Vitality
    'Bullet Resilience':'vitality','Counterspell':'vitality','Ballistic Enchantment':'vitality',
    'Dispel Magic':'vitality','Fortitude':'vitality','Fury Trance':'vitality',
    'Healing Nova':'vitality','Lifestrike':'vitality','Majestic Leap':'vitality',
    'Metal Skin':'vitality','Rescue Beam':'vitality','Spirit Resilience':'vitality',
    'Stamina Mastery':'vitality','Trophy Collector':'vitality','Veil Walker':'vitality','Warp Stone':'vitality',
    // T3 Spirit
    'Decay':'spirit','Disarming Hex':'spirit','Greater Expansion':'spirit','Knockdown':'spirit',
    'Radiant Regeneration':'spirit','Rapid Recharge':'spirit','Silence Wave':'spirit',
    'Spirit Snatch':'spirit','Superior Cooldown':'spirit','Superior Duration':'spirit',
    'Surge of Power':'spirit','Tankbuster':'spirit','Torment Pulse':'spirit',
    // T4 Weapon
    'Armor Piercing Rounds':'weapon','Capacitor':'weapon','Crippling Headshot':'weapon',
    'Crushing Fists':'weapon','Frenzy':'weapon','Glass Cannon':'weapon','Lucky Shot':'weapon',
    'Ricoshet':'weapon','Shadow Weave':'weapon','Silencer':'weapon','Spellslinger':'weapon','Spiritual Overflow':'weapon',
    // T4 Vitality
    'Cheat Death':'vitality','Colossus':'vitality','Divine Barrier':'vitality',
    "Diviner's Kevlar":'vitality','Healing Tempo':'vitality','Infuser':'vitality',
    'Inhibitor':'vitality','Juggernaut':'vitality','Leech':'vitality','Phantom Strike':'vitality',
    'Plated Armor':'vitality','Siphon Bullets':'vitality','Spellbreaker':'vitality',
    'Unstoppable':'vitality','Vampiric Burst':'vitality','Witchmail':'vitality',
    // T4 Spirit
    'Arctic Blast':'spirit','Boundless Spirit':'spirit','Cursed Relic':'spirit',
    'Echo Shard':'spirit','Escalating Exposure':'spirit','Ethereal Shift':'spirit',
    'Focus Lens':'spirit','Lightning Scroll':'spirit','Magic Carpet':'spirit',
    'Mercurial Magnum':'spirit','Mystic Reverb':'spirit','Refresher':'spirit',
    'Scourge':'spirit','Spirit Burn':'spirit','Transcendent Cooldown':'spirit','Vortex Web':'spirit',
  }));

  // API CDN image overrides (populated by initFromAPI)
  const API_ITEM_IMAGE = new Map(); // display name → CDN image URL
  let SOULS_ICON_URL = '';
  const TIER_COST = { 1: 800, 2: 1600, 3: 3200, 4: 6400 }; // fallback, overwritten by API
  const getItemCost = (name) => TIER_COST[ITEM_TIER.get(name)] ?? 0;

  const cardBackerUrl = (name) => {
    const type = ITEM_TYPE.get(name);
    const tier = ITEM_TIER.get(name);
    if (!type || !tier) return null;
    return `items/cards/card_backer_${type}_t${tier}_psd.png`;
  };

  const TYPE_COLOR  = { vitality: '#7cbb1e', spirit: '#a64dff', weapon: '#ec981a' };
  const TIER_ROMAN  = { 1: 'I', 2: 'II', 3: 'III', 4: 'IV' };

  function makeTierBadge(tier, name) {
    if (!tier) return null;
    const type = ITEM_TYPE.get(name);
    const wrap = document.createElement('div');
    wrap.className = 'tier-badge';
    const bg = document.createElement('div');
    bg.className = 'tier-badge-bg';
    bg.style.backgroundColor = TYPE_COLOR[type] || '#8a8a8a';

    num.className = 'tier-badge-num';
    num.textContent = TIER_ROMAN[tier] || '';
    wrap.appendChild(bg);
    wrap.appendChild(num);
    return wrap;
  }

  // Маппинг: отображаемое имя -> имя для файла картинки (НЕ менять названия картинок)
  const ITEM_IMAGE_KEY = new Map([
    ["Cursed Relic", "Curse"],
    ["Dispel Magic", "Debuff Remover"],
  ]);

  // =========================================================
  // 2) РЕЦЕПТЫ И КОНФЛИКТЫ
  // =========================================================
  const RECIPES = {
    "Point Blank": ["Close Quarters"],
    "Titanic Magazine": ["Extended Magazine"],
    "Escalating Resilience": ["Extended Magazine"],
    "Headhunter": ["Headshot Booster"],
    "Armor Piercing Rounds": ["High Velocity Rounds"],
    "Express Shot": ["High Velocity Rounds"],
    "Cultist Sacrifice": ["Monster Rounds"],
    "Burst Fire": ["Rapid Rounds"],
    "Swift Striker": ["Rapid Rounds"],
    "Sharpshooter": ["Long Range"],
    "Crushing Fists": ["Melee Charge"],
    "Spirit Rend": ["Spirit Shredder Bullets"],
    "Crippling Headshot": ["Weakening Headshot"],
    "Capacitor": ["Tesla Bullets"],
    "Fortitude": ["Extra Health"],
    "Colossus": ["Extra Health"],
    "Healing Booster": ["Extra Regen"],
    "Healing Tempo": ["Healing Booster"],
    "Kinetic Dash": ["Extra Stamina"],
    "Stamina Mastery": ["Extra Stamina"],
    "Arcane Surge": ["Extra Stamina"],
    "Rescue Beam": ["Healing Rite"],
    "Healing Nova": ["Healing Rite"],
    "Lifestrike": ["Melee Lifesteal"],
    "Enduring Speed": ["Sprint Boots"],
    "Trophy Collector": ["Sprint Boots"],
    "Juggernaut": ["Enduring Speed"],
    "Leech": ["Bullet Lifesteal"],
    "Fury Trance": ["Bullet Lifesteal"],
    "Weighted Shots": ["Slowing Bullets"],

    // ОБНОВЛЕНО:
    // Dispel Magic: no longer builds from Debuff Reducer (удалено)
    // Spellbreaker: now builds out of Debuff Reducer (добавлено)
    "Unstoppable": ["Debuff Reducer"],
    "Spellbreaker": ["Debuff Reducer"],

    "Divine Barrier": ["Guardian Ward"],
    "Leech": ["Spirit Lifesteal"],
    "Infuser": ["Spirit Lifesteal"],
    "Rapid Recharge": ["Extra Charge"],
    "Improved Spirit": ["Extra Spirit"],
    "Surge of Power": ["Extra Spirit"],
    "Boundless Spirit": ["Improved Spirit"],
    "Greater Expansion": ["Mystic Expansion"],
    "Radiant Regeneration": ["Mystic Regeneration"],
    "Disarming Hex": ["Rusted Barrel"],
    "Spirit Snatch": ["Spirit Strike"],
    "Arctic Blast": ["Cold Front"],
    "Superior Cooldown": ["Compress Cooldown"],
    "Transcendent Cooldown": ["Superior Cooldown"],
    "Superior Duration": ["Duration Extender"],
    "Escalating Exposure": ["Mystic Vulnerability"],
    "Mercurial Magnum": ["Quicksilver Reload"],
    "Vortex Web": ["Slowing Hex"],
    "Silence Wave": ["Spirit Sap"],
    "Tankbuster": ["Mystic Burst"],
    "Lightning Scroll": ["Mystic Slow"]
  };

  // ===== АКТИВНЫЕ ПРЕДМЕТЫ И ЛИМИТ =====
  const ACTIVE_CAP = 4;
  const ACTIVE_ITEMS = new Set([
    "Fleetfoot","Split Shot","Alchemical Fire","Blood Tribute","Cultist Sacrifice","Heroic Aura",
    "Capacitor","Shadow Weave","Healing Rite","Guardian Ward","Restorative Locket","Return Fire",
    "Dispel Magic","Fury Trance","Healing Nova","Majestic Leap","Metal Skin","Rescue Beam",
    "Warp Stone","Colossus","Divine Barrier","Infuser","Phantom Strike","Unstoppable","Vampiric Burst",
    "Rusted Barrel","Cold Front","Slowing Hex","Spirit Sap","Decay","Disarming Hex","Knockdown",
    "Silence Wave","Arctic Blast","Cursed Relic","Echo Shard","Ethereal Shift","Focus Lens","Magic Carpet",
    "Refresher","Scourge","Vortex Web"
  ]);

  const conflictGroups = (() => {
    const adj = new Map();
    const addEdge = (a,b) => {
      if(!adj.has(a)) adj.set(a,new Set());
      if(!adj.has(b)) adj.set(b,new Set());
      adj.get(a).add(b); adj.get(b).add(a);
    };
    for (const [result, parts] of Object.entries(RECIPES)) {
      for (const p of parts) addEdge(result, p);
    }
    for (const it of ALL_ITEMS) if(!adj.has(it)) adj.set(it, new Set());

    const visited = new Set();
    const groups = [];
    for (const node of adj.keys()) {
      if (visited.has(node)) continue;
      const stack = [node];
      const comp = new Set();
      visited.add(node);
      while (stack.length) {
        const v = stack.pop();
        comp.add(v);
        for (const w of adj.get(v)) {
          if (!visited.has(w)) { visited.add(w); stack.push(w); }
        }
      }
      groups.push(comp);
    }
    const compIndex = new Map();
    groups.forEach((set, idx)=>{ for(const name of set) compIndex.set(name, idx); });
    return { groups, compIndex };
  })();

  const sameGroup = (a, b) => {
    const ai = conflictGroups.compIndex.get(a);
    const bi = conflictGroups.compIndex.get(b);
    return ai !== undefined && ai === bi && a !== b;
  };

  // =========================================================
  // 3) ХЕЛПЕРЫ
  // =========================================================
  const resultEl = document.getElementById('result');
  const warnEl   = document.getElementById('warn');
  const rollBtn  = document.getElementById('rollBtn');

  const shuffle = a => { for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };
  const isAllowed = (candidate, picked) => !picked.some(p => sameGroup(candidate,p));

  // ВАЖНО: картинка определяется по ключу (старому имени), а не по отображаемому
  const nameToFile = (name) =>
    "items/" +
    String(ITEM_IMAGE_KEY.get(name) || name).toLowerCase()
      .replace(/['’]/g,"")
      .replace(/\s+/g,"_")
      .replace(/[^a-z0-9_]/g,"") +
    "_sm.webp";

  const makeImg = name => {
    const frame = document.createElement('div');

    frame.appendChild(img);
    const badge = makeTierBadge(ITEM_TIER.get(name), name);
    if (badge) frame.appendChild(badge);
    return frame;
  };

  function getTranslateY(el){
    const t = getComputedStyle(el).transform;
    if (!t || t === 'none') return 0;
    const m = t.match(/matrix.*\((.+)\)/);
    if (!m) return 0;
    const parts = m[1].split(',').map(s => parseFloat(s.trim()));
    return parts.length >= 6 ? parts[5] : 0;
  }

  function splitTotalInto4(total) {
    const cuts = [0,
      Math.floor(Math.random() * (total + 1)),
      Math.floor(Math.random() * (total + 1)),
      Math.floor(Math.random() * (total + 1)),
      total
    ].sort((a,b)=>a-b);
    return [
      cuts[1]-cuts[0],
      cuts[2]-cuts[1],
      cuts[3]-cuts[2],
      cuts[4]-cuts[3],
    ];
  }

  // =========================================================
  // 4) СПИН-АНИМАЦИЯ (универсальная)
  // =========================================================
  function startLinearSpin(slotEl, pool, makeImgFn, speedPx = 240) {
    const inner = slotEl.querySelector('.slot-inner, .hero-slot-inner');
    const frame = slotEl.clientHeight;

    if (!inner.children.length) {
      inner.appendChild(makeImgFn(pool[Math.floor(Math.random() * pool.length)]));
      for (let i = 0; i < 6; i++) inner.appendChild(makeImgFn(pool[Math.floor(Math.random()*pool.length)]));
    }

    slotEl._offset = slotEl._offset || 0;
    slotEl._lastTs = 0;

    function step(ts) {
      if (!slotEl._lastTs) slotEl._lastTs = ts;
      const dt = (ts - slotEl._lastTs) / 1000;
      slotEl._lastTs = ts;

      slotEl._offset += speedPx * dt;

      while (slotEl._offset >= frame) {
        slotEl._offset -= frame;
        inner.insertBefore(makeImgFn(pool[Math.floor(Math.random()*pool.length)]), inner.firstChild);
        if (inner.children.length > 16) inner.removeChild(inner.lastChild);
      }

      const y = -frame + slotEl._offset;
      inner.style.transition = 'none';
      inner.style.transform  = `translateY(${y}px)`;

      const progress = (y + frame) / frame;
      const idx = progress < 0.5 ? 1 : 0;
      const vis = inner.children[idx];
      if (vis && slotEl._caption) slotEl._caption.textContent = vis.dataset.name || '';

      slotEl._raf = requestAnimationFrame(step);
    }

    cancelAnimationFrame(slotEl._raf);
    slotEl._raf = requestAnimationFrame(step);
  }

  function stopWithDecel(slotEl, finalEntry, pool, makeImgFn, speedPx = 240, extraSpins = 6) {
    const inner = slotEl.querySelector('.slot-inner, .hero-slot-inner');
    cancelAnimationFrame(slotEl._raf);

    const frame = slotEl.clientHeight;
    const k = extraSpins + 1;

    const y0 = getTranslateY(inner);
    inner.style.transition = 'none';
    inner.style.transform  = `translateY(${y0}px)`;
    inner.offsetHeight;

    for (let i = 0; i < extraSpins; i++) inner.insertBefore(makeImgFn(pool[Math.floor(Math.random()*pool.length)]), inner.firstChild);
    inner.insertBefore(makeImgFn(finalEntry), inner.firstChild);

    const yStart = y0 - k * frame;
    inner.style.transform = `translateY(${yStart}px)`;
    inner.offsetHeight;

    const distance = 0 - yStart;
    const duration = Math.max(180, Math.round((Math.abs(distance) / speedPx) * 1000));

    let stopRaf;
    function tickCaption() {
      const yy = getTranslateY(inner);
      const idx = Math.min(inner.children.length - 1, Math.max(0, Math.round(-yy / frame)));
      const vis = inner.children[idx];
      if (vis && slotEl._caption) slotEl._caption.textContent = vis.dataset.name || '';
      stopRaf = requestAnimationFrame(tickCaption);
    }

    requestAnimationFrame(() => {
      inner.style.transition = `transform ${duration}ms cubic-bezier(.2,.9,.1,1)`;
      inner.style.transform  = 'translateY(0)';
      stopRaf = requestAnimationFrame(tickCaption);
    });

    const finalName = (finalEntry && typeof finalEntry === 'object') ? (finalEntry.name || '') : String(finalEntry);

    return new Promise(resolve => {
      inner.addEventListener('transitionend', () => {
        cancelAnimationFrame(stopRaf);
        if (slotEl._caption) slotEl._caption.textContent = finalName;
        inner.style.transition = 'none';
        inner.style.transform  = 'translateY(0)';
        while (inner.children.length > 14) inner.removeChild(inner.lastChild);
        resolve();
      }, { once: true });
    });
  }

  // =========================================================
  // 5) СОБИРАТЕЛЬ ПРЕДМЕТОВ (с лимитом активных)
  // =========================================================
  function buildPicks(totalWanted, counts) {
    const picks = [];
    let activeCount = 0;

    const canAdd = (name) => {
      if (!isAllowed(name, picks)) return false;
      if (ACTIVE_ITEMS.has(name) && activeCount >= ACTIVE_CAP) return false;
      return true;
    };
    const add = (name) => {
      picks.push(name);
      if (ACTIVE_ITEMS.has(name)) activeCount++;
    };

    for (let t = 1; t <= 4; t++) {
      const need = counts[t] || 0;
      if (need <= 0) continue;

      const pool = shuffle([...TIERS[t]]);
      for (const cand of pool) {
        const haveInTier = picks.filter(x => TIERS[t].includes(x)).length;
        if (haveInTier >= need) break;
        if (canAdd(cand)) add(cand);
      }

      let haveInTier = picks.filter(x => TIERS[t].includes(x)).length;
      if (haveInTier < need) {
        const nonActive = shuffle(TIERS[t].filter(n => !ACTIVE_ITEMS.has(n)));
        for (const cand of nonActive) {
          haveInTier = picks.filter(x => TIERS[t].includes(x)).length;
          if (haveInTier >= need) break;
          if (canAdd(cand)) add(cand);
        }
      }
    }

    if (picks.length < totalWanted) {
      const zeroPool = [];
      for (let t = 1; t <= 4; t++) if ((counts[t] || 0) === 0) zeroPool.push(...TIERS[t]);
      shuffle(zeroPool);

      for (const cand of zeroPool) {
        if (picks.length >= totalWanted) break;
        if (canAdd(cand)) add(cand);
      }
    }

    if (picks.length < totalWanted) {
      const nonActiveAll = shuffle(ALL_ITEMS.filter(n => !ACTIVE_ITEMS.has(n)));
      for (const cand of nonActiveAll) {
        if (picks.length >= totalWanted) break;
        if (canAdd(cand)) add(cand);
      }
    }

    return picks;
  }

  // =========================================================
  // 6) БИЛД — ФЛИП-КАРТЫ
  // =========================================================
  let currentPicks = [];
  let flippedCount = 0;

  function makeFlipCard(name) {
    const wrapper = document.createElement('div');
    wrapper.className = 'flip-wrapper';

    const flipper = document.createElement('div');
    flipper.className = 'flipper';

    // Лицевая сторона (рубашка)
    const front = document.createElement('div');
    front.className = 'card-front';
    const logo = document.createElement('img');
    logo.className = 'card-front-logo';
    logo.src = 'items/cards/Deadlock_logo.png';
    front.appendChild(logo);

    // Обратная сторона (предмет)
    const back = document.createElement('div');
    back.className = 'card-back';

    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.style.cssText = 'width:100%;height:94px;border:none;border-radius:0;flex-shrink:0;padding:1px;box-sizing:border-box;';
    const inner = document.createElement('div');
    inner.className = 'slot-inner';
    const img = document.createElement('img');
    img.src = API_ITEM_IMAGE.get(name) || nameToFile(name);
    img.style.cssText = 'width:100%;height:86px;object-fit:contain;display:block;border-radius:8px;';
    inner.appendChild(img);
    const badge = makeTierBadge(ITEM_TIER.get(name), name);
    if (badge) slot.appendChild(badge);
    slot.appendChild(inner);

    const nameDiv = document.createElement('div');
    nameDiv.className = 'item-name';
    nameDiv.style.cssText = 'position:static;flex:1;min-height:unset;background:transparent;padding:2px 3px;';
    const cap = document.createElement('p');
    cap.textContent = name;
    cap.style.cssText = 'color:#020101;font-size:13px;font-family:Rajdhani,sans-serif;font-weight:700;margin:0;text-align:center;line-height:1.1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;';
    nameDiv.appendChild(cap);

    const backer = cardBackerUrl(name);
    if (backer) back.style.backgroundImage = `url('${backer}')`;
    back.style.backgroundSize = '100% 100%';

    back.appendChild(slot);
    back.appendChild(nameDiv);

    flipper.appendChild(front);
    flipper.appendChild(back);
    wrapper.appendChild(flipper);

    wrapper.addEventListener('click', () => flipCard(wrapper));
    return wrapper;
  }

  function flipCard(wrapper) {
    const flipper = wrapper.querySelector('.flipper');
    if (flipper.classList.contains('flipped')) return;
    flipper.classList.add('flipped');
    flippedCount++;
    checkAllFlipped();
  }

  function checkAllFlipped() {
    const total = resultEl.querySelectorAll('.flip-wrapper').length;
    if (flippedCount >= total && total > 0) {
      revealAllBtn.disabled = true;
      showTotalCost();
      updateSummary('items');
    }
  }

  function showTotalCost() {
    const totalCostEl = document.getElementById('totalCost');
    const total = currentPicks.reduce((sum, name) => sum + getItemCost(name), 0);
    const soulsImg = `<img src="items/souls/Souls.webp" class="souls-icon">`;
    totalCostEl.innerHTML = `<span>Total cost:</span><strong>${total.toLocaleString()} ${soulsImg}</strong>`;
  }

  rollBtn.addEventListener('click', () => {
    resultEl.innerHTML = '';
    warnEl.textContent = '';
    document.getElementById('totalCost').innerHTML = '<span>Total cost:</span><strong>???<img src="items/souls/Souls.webp" class="souls-icon" style="opacity:0"></strong>';

    const totalWanted = parseInt(document.getElementById('total').value) || 10;
    const counts = {
      1: parseInt(document.getElementById('tier1').value) || 0,
      2: parseInt(document.getElementById('tier2').value) || 0,
      3: parseInt(document.getElementById('tier3').value) || 0,
      4: parseInt(document.getElementById('tier4').value) || 0,
    };
    currentPicks = buildPicks(totalWanted, counts);
    flippedCount = 0;

    if (currentPicks.length < totalWanted) {
      warnEl.textContent = `Предупреждение: из-за конфликтов/лимитов удалось выбрать только ${currentPicks.length} из ${totalWanted}.`;
    }

    const allCards = currentPicks.map(name => makeFlipCard(name, false));
    allCards.forEach((card, i) => {
      card.style.animationDelay = `${i * 60}ms`;
      card.classList.add('dealing');
      resultEl.appendChild(card);
    });

    revealAllBtn.disabled = false;
    showTotalCost();
    updateSummary('items');
  });

  revealAllBtn.addEventListener('click', () => {
    resultEl.querySelectorAll('.flip-wrapper').forEach(w => flipCard(w));
  });

  randBtn.addEventListener('click', () => {
    const totalWanted = parseInt(document.getElementById('total').value) || 0;
    const [c1,c2,c3,c4] = splitTotalInto4(totalWanted);

    document.getElementById('tier1').value = c1;
    document.getElementById('tier2').value = c2;
    document.getElementById('tier3').value = c3;
    document.getElementById('tier4').value = c4;
  });

  // =========================================================
  // HERO SELECTION
  // =========================================================
  let selectedHeroId = null;
  const heroSelectGrid = document.getElementById('heroSelectGrid');

  function buildHeroSelectGrid() {
    heroSelectGrid.innerHTML = '';
    HEROES.forEach(hero => {
      const card = document.createElement('div');
      card.className = 'hero-select-card';
      card.dataset.heroName = hero.name;

      const img = document.createElement('img');
      img.src = hero.imageUrl || (HERO_DIR + hero.file);
      img.alt = hero.name;

      const nameEl = document.createElement('div');
      nameEl.className = 'hero-name';
      nameEl.textContent = hero.name;

      card.appendChild(img);
      card.appendChild(nameEl);

      card.addEventListener('click', async () => {
        heroSelectGrid.querySelectorAll('.hero-select-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');

        // find hero id from HERO_LIST
        const found = HERO_LIST.find(h => h.name === hero.name);
        selectedHeroId = found ? found.id : null;

        // sync abilities select + load abilities
        const heroSelectEl = document.getElementById('heroSelect');
        if (selectedHeroId) {
          heroSelectEl.value = selectedHeroId;
          await loadHeroAbilities(selectedHeroId);
        }

        updateSummary('heroes');
      });

      heroSelectGrid.appendChild(card);
    });
  }

  // =========================================================
  // API INTEGRATION
  // =========================================================
  async function initFromAPI() {
    const statusEl = document.createElement('div');
    statusEl.style.cssText = 'font-size:12px;color:var(--muted);margin:0 0 10px;';
    statusEl.textContent = 'Загрузка данных из API...';
    document.querySelector('.site-header').appendChild(statusEl);

    rollBtn.disabled = true;

    try {
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), 8000);

      const [heroesRes, itemsRes, genericRes, iconsRes] = await Promise.all([
        fetch('https://assets.deadlock-api.com/v2/heroes?language=english&only_active=true', { signal: controller.signal }),
        fetch('https://assets.deadlock-api.com/v2/items?language=english', { signal: controller.signal }),
        fetch('https://assets.deadlock-api.com/v2/generic-data', { signal: controller.signal }),
        fetch('https://assets.deadlock-api.com/v1/icons', { signal: controller.signal })
      ]);
      clearTimeout(tid);

      if (heroesRes.ok) {
        const heroes = await heroesRes.json();
        for (const h of heroes) {
          const name = h.name;
          if (!name || name.includes('_')) continue; // skip internal class names
          const imgUrl = h.images?.icon_hero_card || h.images?.icon_image_small;
          const existing = HEROES.find(x => x.name === name);
          if (existing) {
            if (imgUrl) existing.imageUrl = imgUrl;
          } else if (imgUrl) {
            HEROES.push({ name, imageUrl: imgUrl });
          }
          if (h.id && name) HERO_LIST.push({ id: h.id, name });
        }
        // populate hero select
        HERO_LIST.sort((a, b) => a.name.localeCompare(b.name));
        const sel = document.getElementById('heroSelect');
        for (const { id, name } of HERO_LIST) {
          const opt = document.createElement('option');
          opt.value = id;
          opt.textContent = name;
          sel.appendChild(opt);
        }
      }

      if (itemsRes.ok) {
        const items = await itemsRes.json();
        for (const item of items) {
          const type = item.type;
          if (!['weapon', 'spirit', 'vitality'].includes(type)) continue;
          const name = item.name;
          if (!name || name.includes('_')) continue; // skip internal class names
          const tier = item.item_tier ?? item.tier ?? item.shop_tier;
          const imgUrl = item.image_webp || item.image;
          if (imgUrl) API_ITEM_IMAGE.set(name, imgUrl);
          if (tier >= 1 && tier <= 4 && !ALL_ITEMS.includes(name)) {
            TIERS[tier].push(name);
            ALL_ITEMS.push(name);
            ITEM_TIER.set(name, tier);
            ITEM_TYPE.set(name, type);
          }
        }
      }

      if (genericRes.ok) {
        const generic = await genericRes.json();
        const prices = generic.item_price_per_tier;
        if (Array.isArray(prices)) {
          for (let tier = 1; tier <= 4; tier++) {
            if (prices[tier] != null) TIER_COST[tier] = prices[tier];
          }
        }
      }

      if (iconsRes.ok) {
        const icons = await iconsRes.json();
        if (icons.icon_soul) SOULS_ICON_URL = icons.icon_soul;
      }

      statusEl.remove();
    } catch (e) {
      console.warn('Deadlock API load failed:', e);
      statusEl.textContent = 'API недоступен, используются локальные данные.';
      setTimeout(() => statusEl.remove(), 3000);
    } finally {
      rollBtn.disabled = false;
      buildHeroSelectGrid();
    }
  }

  // =========================================================
  // ЧИСЛО ИНПУТ КОНТРОЛЛЕРЫ (+/- КНОПКИ)
  // =========================================================
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.inc-btn, .dec-btn');
    if (!btn) return;

    const target = btn.dataset.target;
    const input = document.getElementById(target);
    if (!input) return;

    let value = parseInt(input.value, 10) || 0;
    const min = parseInt(input.min, 10) || 0;
    const max = parseInt(input.max, 10);

    if (btn.classList.contains('inc-btn')) {
      value++;
      if (max !== undefined && value > max) value = max;
    } else if (btn.classList.contains('dec-btn')) {
      value--;
      if (value < min) value = min;
    }

    input.value = value;
    input.dispatchEvent(new Event('input', { bubbles: true }));
  });

  initFromAPI();

  // =========================================================
  // ABILITY UPGRADE RANDOMIZER (32 cards)
  // =========================================================
  const SK_TIER_COSTS  = [1, 2, 5];
  const SK_AB_NAMES    = ['Ability 1', 'Ability 2', 'Ability 3', 'Ultimate'];
  const SK_AB_IMAGES   = [null, null, null, null];
  const SK_AB_COLORS   = ['#4b8fff', '#7cbb1e', '#ec981a', '#a64dff'];
  const SK_TIER_COLORS = ['#b0b0b0', '#4b8fff', '#c8922a'];

  const HERO_LIST = []; // { id, name } populated after API load

  async function loadHeroAbilities(heroId) {
    if (!heroId) {
      SK_AB_NAMES.splice(0, 4, 'Ability 1', 'Ability 2', 'Ability 3', 'Ultimate');
      SK_AB_IMAGES.fill(null);
      return;
    }
    try {
      const res = await fetch(`https://assets.deadlock-api.com/v2/items/by-hero-id/${heroId}?language=english`);
      if (!res.ok) return;
      const abilities = await res.json();
      // separate non-ult (signature) and ult
      const sigs = abilities.filter(a => a.ability_type !== 'ultimate');
      const ults = abilities.filter(a => a.ability_type === 'ultimate');
      const ordered = [...sigs.slice(0, 3), ...ults.slice(0, 1)];
      ordered.forEach((ab, i) => {
        SK_AB_NAMES[i]  = ab.name || SK_AB_NAMES[i];
        SK_AB_IMAGES[i] = ab.image_webp || ab.image || null;
      });
    } catch (e) { /* silent */ }
  }

  // Approximate game level for card position (0-11)
  // First 3 positions = levels 1,3,5 (before ult unlocks at 6); rest = 7+
  const SK_POS_LEVEL = [1, 3, 5, 7, 8, 9, 10, 11, 12, 13, 14, 15];

  function generateSkillSequence() {
    // All 4 abilities (incl. ult) get random unlock order — ult may appear early if points were saved
    const unlockLevels = shuffle([0, 0, 2, 4]);
    const unlockAt = [unlockLevels[0], unlockLevels[1], unlockLevels[2], unlockLevels[3]];

    const tiersDone = [0, 0, 0, 0];
    const cards = [];

    for (let pos = 0; pos < 12; pos++) {
      const level = SK_POS_LEVEL[pos];
      const available = [0, 1, 2, 3].filter(ab =>
        tiersDone[ab] < 3 && unlockAt[ab] <= level
      );
      const chosen = available[Math.floor(Math.random() * available.length)];
      tiersDone[chosen]++;
      cards.push({ ab: chosen, tier: tiersDone[chosen] });
    }

    return cards; // exactly 12
  }

  function makeSkillCard(data, index) {
    const { ab, tier, p, cost } = data;
    const color  = SK_AB_COLORS[ab];
    const tColor = SK_TIER_COLORS[tier - 1];

    const wrapper = document.createElement('div');
    wrapper.className = 'flip-wrapper skill-flip';

    const flipper = document.createElement('div');
    flipper.className = 'flipper';

    // Рубашка — та же что у предметов
    const front = document.createElement('div');
    front.className = 'card-front';
    const logo = document.createElement('img');
    logo.className = 'card-front-logo';
    logo.src = 'items/cards/Deadlock_logo.png';
    front.appendChild(logo);

    // Оборотная сторона
    const back = document.createElement('div');
    back.className = 'card-back skill-card-back';
    back.style.cssText = `background: linear-gradient(160deg, ${color}28 0%, #1a1208 70%); border-top: 2px solid ${color};`;

    const nameEl = document.createElement('div');
    nameEl.className = 'sc-name';
    nameEl.style.color = color;
    nameEl.textContent = SK_AB_NAMES[ab];

    const imgUrl = SK_AB_IMAGES[ab];
    if (imgUrl) {
      const abilImg = document.createElement('img');
      abilImg.src = imgUrl;
      abilImg.style.cssText = 'width:72px;height:72px;object-fit:contain;border-radius:4px;filter:brightness(0) invert(1);flex-shrink:0;';
      back.appendChild(nameEl);
      back.appendChild(abilImg);
    } else {
      back.appendChild(nameEl);
    }

    // 3 dots representing tier level (filled = current tier)
    const dotsEl = document.createElement('div');
    dotsEl.className = 'sc-dots';
    for (let i = 1; i <= 3; i++) {
      const dot = document.createElement('div');
      dot.className = 'sc-dot';
      dot.style.cssText = `width:10px;height:10px;background:${i <= tier ? tColor : 'rgba(255,255,255,0.12)'};${i <= tier ? `box-shadow:0 0 5px ${tColor}88;` : ''}`;
      dotsEl.appendChild(dot);
    }

    back.appendChild(dotsEl);

    flipper.appendChild(front);
    flipper.appendChild(back);
    wrapper.appendChild(flipper);

    const dealDelay = index * 45;
    wrapper.style.animationDelay = `${dealDelay}ms`;
    wrapper.classList.add('dealing');
    setTimeout(() => flipper.classList.add('flipped'), dealDelay + 380);

    return wrapper;
  }

  const skillResultEl = document.getElementById('skillResult');
  let lastSkillSequence = [];

  document.getElementById('rollSkillBtn').addEventListener('click', () => {
    skillResultEl.innerHTML = '';
    lastSkillSequence = generateSkillSequence();
    lastSkillSequence.forEach((data, i) => skillResultEl.appendChild(makeSkillCard(data, i)));
    updateSummary('skills');
  });

  // =========================================================
  // PAGE NAVIGATION
  // =========================================================
  const scrollContainer = document.getElementById('scrollContainer');
  const pages = ['page-heroes', 'page-skills', 'page-items', 'page-summary'];
  const globalBack = document.getElementById('globalBack');
  const globalNext = document.getElementById('globalNext');
  const dots = document.querySelectorAll('.page-dot');
  let currentPageIdx = 0;

  function goToPage(idx) {
    idx = Math.max(0, Math.min(pages.length - 1, idx));
    document.getElementById(pages[idx])?.scrollIntoView({ behavior: 'smooth' });
  }

  function updateNav(idx) {
    currentPageIdx = idx;
    globalBack.classList.toggle('nav-btn-hidden', idx === 0);
    globalNext.classList.toggle('nav-btn-hidden', idx === pages.length - 1);
    dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  }

  globalNext.addEventListener('click', () => goToPage(currentPageIdx + 1));
  globalBack.addEventListener('click', () => goToPage(currentPageIdx - 1));

  dots.forEach((dot, i) => dot.addEventListener('click', () => goToPage(i)));

  // Track active page on scroll
  const pageEls = pages.map(id => document.getElementById(id));
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) updateNav(pages.indexOf(e.target.id));
    });
  }, { root: scrollContainer, threshold: 0.5 });
  pageEls.forEach(el => el && observer.observe(el));

  // =========================================================
  // SUMMARY UPDATE
  // =========================================================
  function cloneGridRevealed(sourceId, targetId) {
    const src = document.getElementById(sourceId);
    const tgt = document.getElementById(targetId);
    if (!src || !tgt) return;
    tgt.innerHTML = '';
    // clone each child directly so grid CSS applies correctly
    [...src.children].forEach(child => {
      const clone = child.cloneNode(true);
      clone.querySelectorAll('.flipper').forEach(f => f.classList.add('flipped'));
      clone.style.cursor = 'default';
      clone.style.animation = 'none';
      tgt.appendChild(clone);
    });
  }

  function updateSummary(section) {
    if (section === 'heroes') {
      const tgt = document.getElementById('summaryHeroes');
      tgt.innerHTML = '';
      const sel = heroSelectGrid.querySelector('.hero-select-card.selected');
      if (sel) tgt.appendChild(sel.cloneNode(true));
    }
    if (section === 'skills') cloneGridRevealed('skillResult', 'summarySkills');
    if (section === 'items') {
      cloneGridRevealed('result', 'summaryItems');
      const src = document.getElementById('totalCost');
      const tgt = document.getElementById('summaryTotalCost');
      if (src && tgt) {
        const hasItems = document.getElementById('result')?.children.length > 0;
        const strong = src.querySelector('strong');
        tgt.innerHTML = hasItems && strong ? strong.innerHTML : '';
      }
    }
    saveOverlayData();
  }

  const overlayChannel = new BroadcastChannel('deadlock_overlay');

  function saveOverlayData() {
    const sel = heroSelectGrid.querySelector('.hero-select-card.selected');
    const hero = sel ? {
      name: sel.querySelector('.hero-name')?.textContent || '',
      img: sel.querySelector('img')?.getAttribute('src') || ''
    } : null;

    const skillCards = [...document.querySelectorAll('#skillResult .flip-wrapper')];
    const skills = skillCards.map((card, i) => {
      const back = card.querySelector('.skill-card-back');
      const seq = lastSkillSequence[i];
      return {
        img: back?.querySelector('img')?.getAttribute('src') || '',
        name: back?.querySelector('.sc-name')?.textContent || '',
        tier: seq?.tier || 0,
        ab: seq?.ab ?? -1
      };
    });

    const items = currentPicks.map(name => ({
      name,
      img: API_ITEM_IMAGE.get(name) || nameToFile(name),
      tier: ITEM_TIER.get(name) || 1
    }));

    const totalCost = currentPicks.length > 0
      ? currentPicks.reduce((s, n) => s + getItemCost(n), 0)
      : null;

    const data = { hero, skills, items, totalCost, updatedAt: Date.now() };
    localStorage.setItem('deadlock_overlay', JSON.stringify(data));
    overlayChannel.postMessage(data);
    const relayUrl = localStorage.getItem('overlay_relay_url') || 'http://localhost:3030';
    fetch(`${relayUrl}/update`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).catch(() => {});
  }
});
