<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Deadlock Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    font-size: 13px;
    padding: 14px;
  }
  .title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c8922a;
    font-weight: 700;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(200,146,42,0.3);
  }
  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #555;
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .dot.online  { background: #4caf50; box-shadow: 0 0 6px #4caf5099; }
  .dot.offline { background: #f44336; box-shadow: 0 0 6px #f4433699; }
  .status-text { color: rgba(255,255,255,0.6); font-size: 12px; }
  button {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid rgba(244,67,54,0.35);
    border-radius: 6px;
    background: rgba(244,67,54,0.07);
    color: #f44336;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: rgba(244,67,54,0.18); }
</style>
</head>
<body>
<div class="title">Deadlock Overlay</div>
<div class="status-row">
  <div class="dot" id="dot"></div>
  <div class="status-text" id="status">Checking...</div>
</div>
<button id="stopBtn">Stop server</button>

<script>
async function checkStatus() {
  try {
    await fetch('http://localhost:3030/data/ping');
    setStatus(true);
  } catch {
    setStatus(false);
  }
}

function setStatus(online) {
  document.getElementById('dot').className = `dot ${online ? 'online' : 'offline'}`;
  document.getElementById('status').textContent = online ? 'Server running' : 'Server offline';
  document.getElementById('stopBtn').style.display = online ? 'block' : 'none';
}

document.getElementById('stopBtn').addEventListener('click', async function() {
  await fetch('http://localhost:3030/shutdown', { method: 'POST' }).catch(() => {});
  setStatus(false);
});

checkStatus();
setInterval(checkStatus, 3000);
</script>
</body>
</html>
